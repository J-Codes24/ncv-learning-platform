<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'home' %}">NCV Learning</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'subjects' %}">Subjects</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'videos' %}">Videos</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'past_papers' %}">Past Papers</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5">
    <h1 class="mb-4">Subjects</h1>

    {% if subjects %}
        <div class="row">
            {% for subject in subjects %}
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">{{ subject.name }}</h5>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No subjects available yet.</p>
    {% endif %}
</div>

</body>
</html>
