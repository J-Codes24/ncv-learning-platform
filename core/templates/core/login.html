{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NCV Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="google-adsense-account" content="ca-pub-1066044704966443">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1066044704966443" crossorigin="anonymous"></script>
    <style>
        body {
            background-image: url("{% static 'images/ncv-learning-image.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-box {
            background: rgba(255,255,255,0.96);
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
<div class="overlay">
    <div class="form-box">
        <h2 class="text-center mb-4">Student Login</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">
            Don’t have an account?
            <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>
{% include "core/footer.html" %}
</body>
</html>
